<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>PlayReady Sports — Find Your Match. Own The Pitch.</title>
    <meta name="description" content="PlayReady Sports: discover pickup football matches near you, book floodlit pitches, join gala tournaments, and climb the leaderboard. Built for Ghana's footballers." />
    <meta name="keywords" content="football Ghana, pickup football, book a pitch, grassroots football, football Accra, PlayReady Sports, join a match Ghana, floodlit pitch" />
    <meta name="author" content="PlayReady Sports" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://joinplayready.com/" />

    <!-- Favicon + PWA -->
    <link rel="icon" type="image/x-icon" href="/prs.ico" />
    <link rel="shortcut icon" href="/prs.ico" />
    <link rel="apple-touch-icon" href="/prs.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PlayReady" />

    <!-- Open Graph (Facebook / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PlayReady Sports" />
    <meta property="og:url" content="https://joinplayready.com/" />
    <meta property="og:title" content="PlayReady Sports — Find Your Match. Own The Pitch." />
    <meta property="og:description" content="Pickup football, real venues, real ratings. Join or create a match in minutes. Designed for the Ghanaian matchday." />
    <meta property="og:image" content="https://joinplayready.com/prs-og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GH" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@playreadysports" />
    <meta name="twitter:title" content="PlayReady Sports — Find Your Match. Own The Pitch." />
    <meta name="twitter:description" content="Pickup football, real venues, real ratings. Designed for the Ghanaian matchday." />
    <meta name="twitter:image" content="https://joinplayready.com/prs-og.png" />
    <meta name="twitter:image:alt" content="PlayReady Sports app preview" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PlayReady Sports",
        "url": "https://joinplayready.com/",
        "logo": "https://joinplayready.com/prs-og.png"
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet" />

    <!-- Paystack -->
    <script src="https://js.paystack.co/v2/inline.js" defer></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' });
        });
      }
    </script>
  </body>
</html>
